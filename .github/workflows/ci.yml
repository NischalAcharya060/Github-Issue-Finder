name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Lint codebase
      run: npm run lint

    - name: Typecheck codebase
      run: npm run typecheck

    - name: Run tests
      run: npm run test
      env:
        DATABASE_URL: "postgresql://mock:mock@localhost:5432/mock"
        DIRECT_URL: "postgresql://mock:mock@localhost:5432/mock"
        AUTH_SECRET: "mock-secret-for-ci-pipeline-execution"
        AUTH_GITHUB_ID: "mock-github-id"
        AUTH_GITHUB_SECRET: "mock-github-secret"
